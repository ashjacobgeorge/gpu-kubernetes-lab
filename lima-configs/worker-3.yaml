vmType: vz
os: Linux
arch: aarch64

cpus: 2
memory: "3GiB"
disk: "20GiB"

images:
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-arm64.img"
    arch: aarch64

networks:
  - vzNAT: true

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -e
      set -x

      echo "===> [1/6] Disabling swap..."
      swapoff -a
      sed -i '/swap/d' /etc/fstab
      echo "===> [1/6] Done."

      echo "===> [2/6] Loading kernel modules..."
      printf 'overlay\nbr_netfilter\n' > /etc/modules-load.d/k8s.conf
      modprobe overlay
      modprobe br_netfilter
      echo "===> [2/6] Done."

      echo "===> [3/6] Applying kernel networking settings..."
      printf 'net.bridge.bridge-nf-call-iptables=1\nnet.bridge.bridge-nf-call-ip6tables=1\nnet.ipv4.ip_forward=1\n' > /etc/sysctl.d/k8s.conf
      sysctl --system
      echo "===> [3/6] Done."

      echo "===> [4/6] Installing containerd..."
      apt-get update -y
      apt-get install -y containerd apt-transport-https curl gpg
      mkdir -p /etc/containerd
      containerd config default > /etc/containerd/config.toml
      sed -i "s/SystemdCgroup = false/SystemdCgroup = true/" /etc/containerd/config.toml
      systemctl restart containerd
      systemctl enable containerd
      echo "===> [4/6] Done."

      echo "===> [5/6] Adding Kubernetes apt repository..."
      mkdir -p /etc/apt/keyrings
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /" > /etc/apt/sources.list.d/kubernetes.list
      echo "===> [5/6] Done."

      echo "===> [6/6] Installing kubelet kubeadm kubectl..."
      apt-get update -y
      apt-get install -y kubelet kubeadm kubectl
      apt-mark hold kubelet kubeadm kubectl
      echo "===> [6/6] Done."

      echo "===> Worker node setup complete - ready for kubeadm join"

hostResolver:
  enabled: true

containerd:
  system: false
  user: false
